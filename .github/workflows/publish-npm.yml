name: publish-npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, for example 0.1.0-dev.1
        required: true
        type: string
      ref:
        description: Git ref to publish from
        required: false
        default: main
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://npm.pkg.github.com

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Rust checks
        run: cargo test

      - name: Validate npm version
        run: |
          case "${{ inputs.version }}" in
            0.1.0-dev.*|0.1.0-beta.*) ;;
            *) echo "unsupported npm package version: ${{ inputs.version }}" >&2; exit 1 ;;
          esac

      - name: Prepare npm package
        run: |
          pnpm -C packages/stim-proto version "${{ inputs.version }}" --no-git-tag-version
          pnpm -C packages/stim-proto build
          mkdir -p .tmp/npm-artifacts
          pnpm -C packages/stim-proto pack --pack-destination ../../.tmp/npm-artifacts

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: stim-proto-npm-package
          path: .tmp/npm-artifacts/*.tgz

      - name: Publish npm package
        run: pnpm -C packages/stim-proto publish --no-git-checks --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
